<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Calendar body -->
  <rect x="3" y="6" width="26" height="23" rx="3" ry="3" fill="#4f46e5"/>
  <!-- Header bar -->
  <rect x="3" y="6" width="26" height="9" rx="3" ry="3" fill="#6366f1"/>
  <rect x="3" y="11" width="26" height="4" fill="#6366f1"/>
  <!-- Ring hooks -->
  <rect x="10" y="3" width="3" height="7" rx="1.5" fill="#c7d2fe"/>
  <rect x="19" y="3" width="3" height="7" rx="1.5" fill="#c7d2fe"/>
  <!-- Day dots grid (3×2) -->
  <rect x="7"  y="20" width="4" height="4" rx="1" fill="white"/>
  <rect x="14" y="20" width="4" height="4" rx="1" fill="white"/>
  <rect x="21" y="20" width="4" height="4" rx="1" fill="white"/>
</svg>
